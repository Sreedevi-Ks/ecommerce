<!DOCTYPE html>
<html>
<head>

    <title>Payment</title>

    <style>

        body{
            font-family:Arial;
            background:#fdf9f6;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
        }

        .payment-box{

            width:400px;

            background:white;

            padding:40px;

            border-radius:12px;

            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#6b0f1a;
            margin-bottom:30px;
        }

        .method{

            margin-bottom:20px;

            font-size:18px;
        }

        button{

            width:100%;

            padding:14px;

            border:none;

            background:#6b0f1a;

            color:white;

            border-radius:6px;

            font-size:16px;

            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="payment-box">

    <h1>Select Payment Method</h1>

    <form action="{% url 'checkout' %}" method="POST">

        {% csrf_token %}

        <div class="method">

            <input type="radio"
                   name="payment"
                   value="Cash On Delivery"
                   required>

            Cash On Delivery

        </div>

        <div class="method">

            <input type="radio"
                   name="payment"
                   value="UPI">

            UPI

        </div>

        <div class="method">

            <input type="radio"
                   name="payment"
                   value="Card Payment">

            Card Payment

        </div>

        <button type="submit">

            Pay Now

        </button>

    </form>

</div>

</body>
</html>
