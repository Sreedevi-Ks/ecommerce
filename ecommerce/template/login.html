<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Aadhya Vastra</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #fdf9f6;
}
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 60px;
    background: #6b0f1a;
    color: white;
}

.logo {
    font-size: 26px;
    font-weight: 600;
    font-family: Georgia, "Times New Roman", serif;
}

.nav-links a {
    margin-left: 25px;
    text-decoration: none;
    color: white;
    font-size: 15px;
}

.nav-links a:hover {
    opacity: 0.8;
}
.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

.login-box {
    width: 350px;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    text-align: center;
}

.login-box h2 {
    margin-bottom: 20px;
    color: #6b0f1a;
    font-family: Georgia, "Times New Roman", serif;
}

.login-box input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.login-box button {
    width: 100%;
    padding: 12px;
    background: #6b0f1a;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
}

.login-box button:hover {
    opacity: 0.9;
}

.login-box p {
    margin-top: 15px;
    font-size: 14px;
}

.login-box a {
    color: #6b0f1a;
    text-decoration: none;
    font-weight: 500;
}
.footer {
    background: #6b0f1a;
    color: white;
    text-align: center;
    padding: 15px;
    position: fixed;
    bottom: 0;
    width: 100%;
}
</style>
</head>

<body>
<div class="navbar">
    <div class="logo">Aadhya Vastra</div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'register' %}">Register</a>
    </div>
</div>
<div class="login-container">
    <div class="login-box">
        <h2>Login</h2>
        {% if error %}
        <p style="color:red;">
        {{ error }}
        </p>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="email" placeholder="Enter Email" required>
            <input type="password" name="password" placeholder="Enter Password" required>
            <button type="submit">Login</button>
        </form>

        <p>Don't have an account? <a href="{% url 'register' %}">Register</a></p>
    </div>
</div>
<div class="footer">
    <p>© 2026 Aadhya Vastra</p>
</div>

</body>
</html>
