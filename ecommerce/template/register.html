<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Aadhya Vastra</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #fdf9f6;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 60px;
    background: #6b0f1a;
    color: white;
}

.logo {
    font-size: 26px;
    font-weight: 600;
    font-family: Georgia, "Times New Roman", serif;
}

.nav-links a {
    margin-left: 25px;
    text-decoration: none;
    color: white;
    font-size: 15px;
}

.nav-links a:hover {
    opacity: 0.8;
}
.register-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

.register-box {
    width: 380px;
    background: white;
    padding: 35px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    text-align: center;
}

.register-box h2 {
    margin-bottom: 20px;
    color: #6b0f1a;
    font-family: Georgia, "Times New Roman", serif;
}

.register-box input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
    box-sizing: border-box;
}

.register-box button {
    width: 100%;
    padding: 12px;
    background: #6b0f1a;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    margin-top: 10px;
}

.register-box button:hover {
    opacity: 0.9;
}

.register-box p {
    margin-top: 15px;
    font-size: 14px;
}

.register-box a {
    color: #6b0f1a;
    text-decoration: none;
    font-weight: 500;
}
.footer {
    background: #6b0f1a;
    color: white;
    text-align: center;
    padding: 15px;
    position: fixed;
    bottom: 0;
    width: 100%;
}
</style>
</head>

<body>
<div class="navbar">
    <div class="logo">Aadhya Vastra</div>

    <div class="nav-links">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'register' %}">Register</a>
    </div>
</div>
<div class="register-container">

    <div class="register-box">

        <h2>Create Account</h2>

        <form action="{% url 'ecomregister' %}" method="POST">
        {% csrf_token %}
        {% if error %}
        <p style="color:red; margin-bottom:10px;">
            {{ error }}
        </p>
        {% endif %}

            <input type="email" name="email" placeholder="Enter Email" required>

            <input type="password" name="password" placeholder="Enter Password" required>

            <input type="password" name="confirm_password" placeholder="Confirm Password" required>

            <button type="submit">Register</button>

        </form>

        <p>Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </p>

    </div>

</div>
<div class="footer">
    <p>© 2026 Aadhya Vastra</p>
</div>

</body>
</html>
