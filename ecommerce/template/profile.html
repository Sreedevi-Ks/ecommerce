<!DOCTYPE html>
<html>
<head>

    <title>My Profile</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial;
            background:#fdf9f6;
        }
        .navbar{
            background:#6b0f1a;
            padding:18px 50px;

            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            color:white;
            font-size:28px;
            font-family:Georgia, "Times New Roman", serif;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            margin-left:25px;
            font-size:16px;
        }

        .nav-links a:hover{
            opacity:0.8;
        }
        .profile-container{

            display:flex;
            justify-content:center;
            align-items:center;

            height:85vh;
        }

        .profile-card{

            width:400px;

            background:white;

            padding:40px;

            border-radius:15px;

            box-shadow:0 5px 15px rgba(0,0,0,0.1);

            text-align:center;
        }

        .profile-image{

            width:120px;
            height:120px;

            border-radius:50%;

            margin-bottom:20px;

            object-fit:cover;
        }

        h1{
            color:#6b0f1a;
            margin-bottom:25px;
        }

        .info{

            text-align:left;

            margin-top:20px;
        }

        .info p{

            margin-bottom:15px;

            font-size:17px;
        }

        .label{

            font-weight:bold;
            color:#6b0f1a;
        }

        .logout-btn{

            width:100%;

            padding:12px;

            border:none;

            background:#6b0f1a;

            color:white;

            border-radius:6px;

            margin-top:25px;

            cursor:pointer;

            font-size:16px;
        }

    </style>

</head>

<body>
<div class="navbar">

    <div class="logo">

        Aadhya Vastra

    </div>

    <div class="nav-links">

        <a href="{% url 'userindex' %}">
            Home
        </a>

        <a href="{% url 'products' %}">
            Products
        </a>

        <a href="{% url 'cart' %}">
            Cart
        </a>

        <a href="{% url 'orders' %}">
            Orders
        </a>

        <a href="{% url 'profile' %}">
            Profile
        </a>

    </div>

</div>
<div class="profile-container">

    <div class="profile-card">

        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
             class="profile-image">

        <h1>My Profile</h1>

        <div class="info">

            <p>

                <span class="label">

                    Email :

                </span>

                {{ user.email }}

            </p>

            <p>

                <span class="label">

                    Email :

                </span>

                {{ user.email }}

            </p>

        </div>

        <a href="{% url 'logout' %}">

            <button class="logout-btn">

                Logout

            </button>

        </a>

    </div>

</div>

</body>
</html>
