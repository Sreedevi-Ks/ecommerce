<!DOCTYPE html>
<html>
<head>

<title>Add Product</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f5f1ee;
}
.sidebar{
    width:220px;
    height:100vh;
    background:#6b0f1a;
    color:white;
    position:fixed;
    padding:20px;
}

.sidebar h2{
    margin-bottom:40px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:20px 0;
    font-size:16px;
}

.sidebar a:hover{
    opacity:0.8;
}
.main{
    
    margin-left:220px;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}
.container{
    width:450px;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#6b0f1a;
    margin-bottom:25px;
}

input,textarea{
    width:100%;
    padding:12px;
    margin-bottom:18px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:#6b0f1a;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

</style>

</head>

<body>
<div class="sidebar">

    <h2>Admin Panel</h2>

    <a href="{% url 'adminhome' %}">Home</a>

    <a href="{% url 'addproduct' %}">Add Product</a>
    <a href="{% url 'adminproducts' %}">View Products</a>

    <a href="{% url 'adminorders' %}">Orders</a>

    <a href="{% url 'logout' %}">Logout</a>

</div>
<div class="main">

    <div class="container">

        <h1>Add Product</h1>

        <form action="{% url 'saveproduct' %}" method="POST">

            {% csrf_token %}

            <input type="text"
                   name="name"
                   placeholder="Product Name"
                   required>

            <input type="number"
                   name="price"
                   placeholder="Product Price"
                   required>

            <textarea name="description"
                      placeholder="Product Description"
                      rows="4"
                      required></textarea>

            <input type="text"
                   name="image"
                   placeholder="Paste Image URL"
                   required>

            <button type="submit">

                Add Product

            </button>

        </form>

    </div>

</div>

</body>
</html>
