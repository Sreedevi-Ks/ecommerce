<!DOCTYPE html>
<html>
<head>

    <title>Admin Home</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial;
            background:#f5f1ee;
            display:flex;
        }
        .sidebar{
            width:220px;
            height:100vh;
            background:#6b0f1a;
            color:white;
            position:fixed;
            padding:20px;
        }

        .sidebar h2{
            margin-bottom:40px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            margin:20px 0;
            font-size:16px;
            transition:0.3s;
        }

        .sidebar a:hover{
            padding-left:8px;
            opacity:0.8;
        }
        .main{
            margin-left:220px;
            width:100%;
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(to right,#fff5f5,#fdf2f2);
        }
        .design-box{

            width:80%;
            height:500px;

            background:white;

            border-radius:25px;

            box-shadow:0 10px 30px rgba(0,0,0,0.1);

            position:relative;

            overflow:hidden;
        }
        .circle1{

            width:300px;
            height:300px;

            background:#6b0f1a;

            border-radius:50%;

            position:absolute;

            top:-100px;
            right:-100px;

            opacity:0.1;
        }

        .circle2{

            width:220px;
            height:220px;

            background:#6b0f1a;

            border-radius:50%;

            position:absolute;

            bottom:-80px;
            left:-80px;

            opacity:0.1;
        }
        .content{

            position:absolute;

            top:50%;
            left:50%;

            transform:translate(-50%,-50%);

            text-align:center;
        }

        .content h1{

            font-size:55px;

            color:#6b0f1a;

            margin-bottom:20px;
        }

        .content p{

            font-size:22px;

            color:#666;
        }

    </style>

</head>

<body>
<div class="sidebar">

    <h2>Admin Panel</h2>

    <a href="{% url 'adminhome' %}">
        Home
    </a>

    <a href="{% url 'addproduct' %}">
        Add Product
    </a>

    <a href="{% url 'adminproducts' %}">
        View Products
    </a>
    <a href="{% url 'adminorders' %}">Orders</a>

    <a href="{% url 'logout' %}">
        Logout
    </a>

</div>
<div class="main">

    <div class="design-box">

        <div class="circle1"></div>

        <div class="circle2"></div>

        <div class="content">

            <h1>
                Welcome Admin
            </h1>

            <p>
                Manage your ecommerce website easily
            </p>

        </div>

    </div>

</div>

</body>
</html>
